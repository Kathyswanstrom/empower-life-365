<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Name That Tune — TV Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100vh; }
  body {
    background: #0F0A2A;
    color: #fff;
    font-family: 'Georgia', serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Floating dots background */
  .dot {
    position: fixed;
    border-radius: 50%;
    opacity: 0.08;
    animation: floatDot linear infinite;
    pointer-events: none;
  }
  @keyframes floatDot {
    0%   { transform: translateY(110vh) scale(0.5); opacity: 0; }
    10%  { opacity: 0.08; }
    90%  { opacity: 0.08; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  .main-card {
    width: min(92vw, 1400px);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3vh;
    padding: 4vh 4vw;
  }

  .logo {
    font-size: 2.5vh;
    color: #6366F1;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: sans-serif;
    font-weight: 700;
  }

  .big-emoji {
    font-size: 10vh;
    animation: pulse 2s ease-in-out infinite;
    line-height: 1;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.06); }
  }

  .label-clue {
    font-size: 2vh;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #A5B4FC;
    font-family: sans-serif;
    font-weight: 700;
  }

  .clue-text {
    font-size: clamp(20px, 4.5vh, 52px);
    color: #F1F5F9;
    max-width: 900px;
    line-height: 1.4;
    font-style: italic;
    transition: opacity 0.4s;
  }

  .decade-badge {
    background: rgba(99, 102, 241, 0.25);
    border: 1px solid #6366F1;
    color: #A5B4FC;
    padding: 0.5vh 2vw;
    border-radius: 100px;
    font-size: 2vh;
    font-family: sans-serif;
    font-weight: 600;
  }

  /* Answer reveal */
  .answer-wrap {
    background: linear-gradient(135deg, rgba(253,224,71,0.15), rgba(245,158,11,0.15));
    border: 2px solid #F59E0B;
    border-radius: 2vh;
    padding: 3vh 4vw;
    animation: revealPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    min-width: 60vw;
  }
  @keyframes revealPop {
    0%   { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  .answer-label {
    font-size: 2vh;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #F59E0B;
    font-family: sans-serif;
    font-weight: 700;
    margin-bottom: 1vh;
  }
  .answer-title {
    font-size: clamp(28px, 7vh, 90px);
    font-weight: 900;
    color: #FDE68A;
    line-height: 1.1;
  }
  .answer-artist {
    font-size: clamp(16px, 3.5vh, 44px);
    color: #FEF3C7;
    margin-top: 0.5vh;
    font-family: sans-serif;
  }

  /* Scores */
  .scores {
    display: flex;
    gap: 4vw;
    align-items: center;
  }
  .score-box {
    text-align: center;
    background: rgba(255,255,255,0.06);
    border-radius: 1.5vh;
    padding: 1.5vh 3vw;
    min-width: 15vw;
    transition: background 0.3s;
  }
  .score-box.leading {
    background: rgba(99,102,241,0.25);
    border: 1px solid #6366F1;
  }
  .score-team {
    font-size: 1.8vh;
    font-family: sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #94A3B8;
  }
  .score-num {
    font-size: 8vh;
    font-weight: 900;
    font-family: sans-serif;
    line-height: 1;
    color: #fff;
  }
  .score-sep {
    font-size: 4vh;
    color: #334155;
    font-family: sans-serif;
  }

  /* Waiting screen */
  .waiting {
    font-size: 3vh;
    color: #475569;
    font-family: sans-serif;
    text-align: center;
  }
  .waiting-emoji { font-size: 8vh; margin-bottom: 2vh; }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 2vh;
    font-size: 1.5vh;
    color: #334155;
    font-family: sans-serif;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<!-- TV launch overlay -->
<div id="fs-btn" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;
  flex-direction:column;align-items:center;justify-content:center;gap:20px;cursor:pointer;"
  onclick="document.getElementById('fs-btn').style.display='none'">
  <div style="font-size:72px;">📺</div>
  <div style="font-size:30px;font-weight:700;color:#fff;">Ready for TV Display</div>
  <div style="display:flex;align-items:center;gap:16px;background:rgba(255,255,255,0.1);padding:16px 32px;border-radius:14px;">
    <span style="font-size:36px;">⌨️</span>
    <div>
      <div style="font-size:20px;font-weight:700;color:#fff;">Press F11 to go fullscreen</div>
      <div style="font-size:14px;color:#94A3B8;margin-top:4px;">Then move this window to your TV screen</div>
    </div>
  </div>
  <div style="background:#6366F1;color:#fff;padding:14px 48px;border-radius:12px;font-size:18px;font-weight:700;margin-top:4px;">
    Click anywhere to start
  </div>
  <div style="font-size:13px;color:#475569;">Press F11 again or Esc to exit fullscreen</div>
</div>

<div class="main-card" id="main-card">
  <div class="waiting">
    <div class="waiting-emoji">🎵</div>
    <div>Waiting for the game to start…</div>
    <div style="font-size:1.8vh;margin-top:1vh;color:#334155;">Open the app and click 📺 TV Mode to begin</div>
  </div>
</div>

<div class="footer">empowerlife365.app — Name That Tune</div>

<script>
var NTT_TV_KEY = 'el365_ntt_tv_state';
var lastState  = null;

function mkDots() {
  for (var i = 0; i < 18; i++) {
    var d = document.createElement('div');
    d.className = 'dot';
    var sz = 20 + Math.random() * 80;
    d.style.cssText = [
      'width:'+sz+'px', 'height:'+sz+'px',
      'left:'+(Math.random()*100)+'vw',
      'background:hsl('+(220+Math.random()*60)+',60%,60%)',
      'animation-duration:'+(8+Math.random()*16)+'s',
      'animation-delay:'+(-Math.random()*20)+'s'
    ].join(';');
    document.body.appendChild(d);
  }
}
mkDots();

function formatDecade(d) {
  var map = {'40s':'1940s','50s':'1950s','60s':'1960s','70s':'1970s','80s':'1980s',
             'country':'🤠 Country','gospel':'🙏 Gospel'};
  return (map[d] || d) + ' ';
}

function render(state) {
  var card = document.getElementById('main-card');
  if (!state) {
    card.innerHTML = '<div class="waiting"><div class="waiting-emoji">🎵</div>' +
      '<div>Waiting for the game to start…</div>' +
      '<div style="font-size:1.8vh;margin-top:1vh;color:#334155;">Open the app and click 📺 TV Mode to begin</div></div>';
    return;
  }

  var aHTML = '';
  if (state.revealed) {
    aHTML = '<div class="answer-wrap">' +
      '<div class="answer-label">🎉 Answer!</div>' +
      '<div class="answer-title">' + esc(state.title) + '</div>' +
      '<div class="answer-artist">' + esc(state.artist) + '</div>' +
      '</div>';
  }

  var sA = state.scoreA || 0, sB = state.scoreB || 0;
  var aLead = sA > sB, bLead = sB > sA;

  card.innerHTML =
    '<div class="logo">🎵 Name That Tune</div>' +
    '<div class="big-emoji">' + (state.emoji || '🎵') + '</div>' +
    '<div class="label-clue">Clue</div>' +
    '<div class="clue-text">' + esc(state.clue) + '</div>' +
    '<div class="decade-badge">📅 ' + formatDecade(state.decade) + '</div>' +
    aHTML +
    '<div class="scores">' +
      '<div class="score-box' + (aLead ? ' leading' : '') + '">' +
        '<div class="score-team">Team A</div>' +
        '<div class="score-num">' + sA + '</div>' +
      '</div>' +
      '<div class="score-sep">vs</div>' +
      '<div class="score-box' + (bLead ? ' leading' : '') + '">' +
        '<div class="score-team">Team B</div>' +
        '<div class="score-num">' + sB + '</div>' +
      '</div>' +
    '</div>';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function poll() {
  try {
    var raw = localStorage.getItem(NTT_TV_KEY);
    var state = raw ? JSON.parse(raw) : null;
    var sig = JSON.stringify(state);
    if (sig !== lastState) {
      lastState = sig;
      render(state);
    }
  } catch(e) {}
}

setInterval(poll, 400);
poll();
</script>

<script>
// ── Show TV launch overlay immediately ──────────
(function() {
  var btn = document.getElementById('fs-btn');
  if (btn) btn.style.display = 'flex';
})();
</script>
</body>
</html>
